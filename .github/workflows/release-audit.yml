name: release-audit

on:
  pull_request:
  push:

jobs:
  github-release-file-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install core, audit, and benchmark dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[test]" -e ./benchmark build ruff
      - name: Audit GitHub file boundary
        run: python3 scripts/audit/github_release_file_audit.py
      - name: Validate Hugging Face package
        run: python3 scripts/audit/validate_hf_release_package.py
      - name: Validate public launch packet
        run: python3 scripts/audit/validate_public_launch_packet.py
      - name: Validate vertical-slice documentation
        run: python3 scripts/audit/validate_vertical_slice_doc.py
      - name: Validate sealed policy-evaluation snapshot
        run: python3 scripts/audit/validate_policy_evaluation_snapshot.py
      - name: Test executable control plane
        run: python3 -m unittest discover -s tests -v
      - name: Lint executable and audit code
        run: python3 -m ruff check agentic_drug_discovery tests adapters/boltz_adapter.py adapters/chembl_adapter.py adapters/opentargets_adapter.py adapters/execution_registry.py adapters/pinned_evidence_adapter.py adapters/clinical_synthesis_adapter.py scripts/audit
      - name: Test benchmark scorer
        run: python3 -m pytest -q benchmark/tests
      - name: Build executable core wheel
        run: python3 -m build --wheel . --outdir /tmp/agentic-core-dist
      - name: Smoke-test installed core wheel
        run: python3 scripts/audit/smoke_test_core_wheel.py --wheel-dir /tmp/agentic-core-dist
      - name: Build benchmark wheel
        run: python3 -m build --wheel benchmark --outdir /tmp/ctdbench-dist
      - name: Build Hugging Face mirror package
        run: python3 scripts/audit/build_hf_release_package.py --output /tmp/agentic-hf-release-package --force
      - name: Validate built Hugging Face mirror package
        run: python3 scripts/audit/validate_hf_release_package.py --package /tmp/agentic-hf-release-package
      - name: Check whitespace
        run: git diff --check
      - name: Compile public Python
        run: python3 -m compileall agentic_drug_discovery adapters chains benchmark/src scripts/audit tests
      - name: Validate release manifest
        run: |
          python3 -m json.tool release_manifest.json >/tmp/release_manifest.json
          python3 -m json.tool huggingface/release_manifest.json >/tmp/hf_release_manifest.json
          python3 -m json.tool release_decision_packet.json >/tmp/release_decision_packet.json
          python3 -m json.tool docs/public_evidence_summary.json >/tmp/public_evidence_summary.json
          python3 -m json.tool docs/retrospective_policy_evaluation_snapshot.json >/tmp/retrospective_policy_evaluation_snapshot.json

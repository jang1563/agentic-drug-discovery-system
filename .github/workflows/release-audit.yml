name: release-audit

on:
  pull_request:
  push:

jobs:
  github-release-file-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit GitHub file boundary
        run: python3 scripts/audit/github_release_file_audit.py
      - name: Compile public scaffold
        run: python3 -m compileall adapters chains scripts/audit
      - name: Validate release manifest
        run: python3 -m json.tool release_manifest.json >/tmp/release_manifest.json
